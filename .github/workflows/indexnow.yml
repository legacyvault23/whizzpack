name: IndexNow — Submit URLs on Deploy

on:
  push:
    branches: [main]

jobs:
  submit-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Collect changed URLs
        id: urls
        run: |
          # Get files changed in this push
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files: $CHANGED"

          URLS=""

          # Map changed files to live URLs
          if echo "$CHANGED" | grep -q "public/index.html"; then
            URLS="$URLS https://www.whizzpack.in/"
          fi
          if echo "$CHANGED" | grep -q "public/corrugated-boxes.html"; then
            URLS="$URLS https://www.whizzpack.in/corrugated-boxes"
          fi
          if echo "$CHANGED" | grep -q "public/cotton-seed-bags.html"; then
            URLS="$URLS https://www.whizzpack.in/cotton-seed-bags"
          fi
          if echo "$CHANGED" | grep -q "public/privacy-policy.html"; then
            URLS="$URLS https://www.whizzpack.in/privacy-policy"
          fi
          if echo "$CHANGED" | grep -q "public/sitemap.xml"; then
            URLS="$URLS https://www.whizzpack.in/sitemap.xml"
          fi

          # Any new or changed blog posts
          BLOG_FILES=$(echo "$CHANGED" | grep "^content/blog/" || true)
          for f in $BLOG_FILES; do
            SLUG=$(basename "$f" .md)
            URLS="$URLS https://www.whizzpack.in/blogs/$SLUG"
            URLS="$URLS https://www.whizzpack.in/blogs"
          done

          # Deduplicate
          URLS=$(echo "$URLS" | tr ' ' '\n' | sort -u | grep "^https" | tr '\n' ' ')
          echo "URLs to submit: $URLS"
          echo "urls=$URLS" >> $GITHUB_OUTPUT

      - name: Submit to IndexNow (Bing)
        if: steps.urls.outputs.urls != ''
        run: |
          URLS="${{ steps.urls.outputs.urls }}"

          # Build JSON array
          URL_JSON=$(echo "$URLS" | tr ' ' '\n' | grep "^https" | python3 -c "
          import sys, json
          urls = [u.strip() for u in sys.stdin if u.strip()]
          print(json.dumps(urls))
          ")

          PAYLOAD=$(cat <<JSONEOF
          {
            "host": "www.whizzpack.in",
            "key": "8249d520fb029e61ad839dfdd862ff69",
            "keyLocation": "https://www.whizzpack.in/8249d520fb029e61ad839dfdd862ff69.txt",
            "urlList": $URL_JSON
          }
          JSONEOF
          )

          echo "Submitting payload: $PAYLOAD"

          curl -s -o response.txt -w "%{http_code}" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD" > status_code.txt

          STATUS=$(cat status_code.txt)
          echo "IndexNow response status: $STATUS"
          cat response.txt

          if [ "$STATUS" = "200" ] || [ "$STATUS" = "202" ]; then
            echo "Successfully submitted to IndexNow"
          else
            echo "IndexNow returned status $STATUS (non-fatal)"
          fi

      - name: Submit to Bing IndexNow directly
        if: steps.urls.outputs.urls != ''
        run: |
          URLS="${{ steps.urls.outputs.urls }}"
          URL_JSON=$(echo "$URLS" | tr ' ' '\n' | grep "^https" | python3 -c "
          import sys, json
          urls = [u.strip() for u in sys.stdin if u.strip()]
          print(json.dumps(urls))
          ")
          PAYLOAD=$(cat <<JSONEOF
          {
            "host": "www.whizzpack.in",
            "key": "8249d520fb029e61ad839dfdd862ff69",
            "keyLocation": "https://www.whizzpack.in/8249d520fb029e61ad839dfdd862ff69.txt",
            "urlList": $URL_JSON
          }
          JSONEOF
          )
          curl -s -X POST "https://www.bing.com/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD" || true
          echo "Bing IndexNow submission attempted"
